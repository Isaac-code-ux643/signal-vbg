{% extends 'base.html' %}

{% block title %}Rechercher un signalement{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Rechercher un signalement</h3>

                <form method="get">
                    <div class="mb-3">
                        <label class="form-label">Code de suivi</label>
                        {{ form.tracking_code }}
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Rechercher
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
