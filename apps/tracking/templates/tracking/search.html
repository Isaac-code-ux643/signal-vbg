{% extends 'base.html' %}

{% block title %}Suivre un dossier{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Suivre votre dossier</h3>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Code de suivi</label>
                        <input type="text" name="tracking_code"
                               class="form-control text-center fw-bold"
                               placeholder="VBG-XXXX-XXXX"
                               style="font-size: 1.2rem; letter-spacing: 2px;"
                               required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Rechercher
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
